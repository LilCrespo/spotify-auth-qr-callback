<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Spotify Auth QR Callback</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            padding: 24px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #101010;
            color: #ffffff;
            text-align: center;
        }

        .card {
            max-width: 560px;
            margin: 0 auto;
            padding: 24px;
            border-radius: 18px;
            background: #1b1b1b;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin-top: 0;
            font-size: 26px;
        }

        p {
            line-height: 1.5;
            color: #dddddd;
        }

        canvas {
            margin-top: 18px;
            padding: 16px;
            border-radius: 10px;
            background: #ffffff;
            max-width: 92vw;
            height: auto;
            image-rendering: pixelated;
        }

        code {
            display: block;
            margin-top: 18px;
            padding: 12px;
            border-radius: 10px;
            background: #000000;
            color: #ffffff;
            word-break: break-all;
            font-size: 13px;
            text-align: left;
        }

        .ok {
            color: #1ed760;
        }

        .error {
            color: #ff6b6b;
        }

        .small {
            margin-top: 16px;
            font-size: 13px;
            color: #aaaaaa;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Spotify Auth QR Callback</h1>

        <p id="message">Reading Spotify authorization response...</p>

        <canvas id="qr" hidden></canvas>

        <code id="payload" hidden></code>

        <p class="small">
            This page does not store tokens, does not contact Spotify, and does not use a backend.
            It only converts the authorization code into a QR code for your setup app.
        </p>
    </div>

    <script src="qrcodegen.js"></script>

    <script>
        function getQueryValue(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        function drawQr(text) {
            // LOW keeps the QR version smaller, which makes each module larger and
            // easier for the Nintendo 3DS camera to read from a phone screen.
            const qr = qrcodegen.QrCode.encodeText(text, qrcodegen.QrCode.Ecc.LOW);
            const canvas = document.getElementById("qr");
            const ctx = canvas.getContext("2d");

            const border = 4;
            const scale = 8;
            const size = qr.size;
            const canvasSize = (size + border * 2) * scale;

            canvas.width = canvasSize;
            canvas.height = canvasSize;

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvasSize, canvasSize);

            ctx.fillStyle = "#000000";

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    if (qr.getModule(x, y)) {
                        ctx.fillRect(
                            (x + border) * scale,
                            (y + border) * scale,
                            scale,
                            scale
                        );
                    }
                }
            }

            canvas.hidden = false;
        }

        const code = getQueryValue("code");
        const state = getQueryValue("state");
        const error = getQueryValue("error");

        const message = document.getElementById("message");
        const payloadBlock = document.getElementById("payload");

        if (error) {
            message.textContent = "Spotify returned an error: " + error;
            message.className = "error";
        } else if (!code) {
            message.textContent = "No authorization code was found in the URL.";
            message.className = "error";
        } else {
            // Compact payload: fewer characters = less dense QR = easier 3DS scan.
            const payload = "c=" + encodeURIComponent(code) + "&s=" + encodeURIComponent(state || "");

            message.textContent = "Authorization code received. Set phone brightness high and scan this QR with your 3DS.";
            message.className = "ok";

            payloadBlock.textContent = payload;
            payloadBlock.hidden = false;

            drawQr(payload);
        }
    </script>
</body>
</html>
